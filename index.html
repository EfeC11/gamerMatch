  body {
    margin: 0;
    padding: 0;
    background: #1A1F1E;
    font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Top bar */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(20, 26, 24, 0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar-logo {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: linear-gradient(135deg, #2A7A60 0%, #1F5C49 100%);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .topbar-title { color: #fff; font-size: 17px; font-weight: 700; letter-spacing: -0.2px; }
  .topbar-sub { color: rgba(255,255,255,0.45); font-size: 13px; font-weight: 500; margin-left: auto; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 395px);
    gap: 56px 40px;
    padding: 60px 60px 100px;
    justify-content: center;
  }

  /* Each screen frame */
  .screen-frame {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .screen-label {
    color: rgba(255,255,255,0.55);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    align-self: flex-start;
    margin-left: 10px;
  }

  /* iPhone shell */
  .device-shell {
    position: relative;
    width: 395px;
    height: 852px;
    background: #111;
    border-radius: 54px;
    border: 8px solid #2A2A2A;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.05),
      inset 0 0 0 1px rgba(255,255,255,0.04),
      0 40px 80px rgba(0,0,0,0.6),
      0 20px 40px rgba(0,0,0,0.4);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Dynamic island notch */
  .notch {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    background: #111;
    border-radius: 20px;
    z-index: 10;
  }

  .device-shell iframe {
    border-radius: 47px;
    display: block;
    pointer-events: none;
  }
</style>

* { box-sizing: border-box; }

html, body {

.screen {

  flex-direction: column;
  position: relative;

/* Status bar */
.status-bar {
  height: 47px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;

  font-size: 15px;
  font-weight: 600;
  color: var(--ink-900);
  background: transparent;
}
.status-bar .time { letter-spacing: 0.2px; }
.status-bar .icons { display: flex; gap: 5px; align-items: center; }

  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ============================================================
   TAB BAR

  height: 83px;

}

  flex: 1;

  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--ink-400);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
}
.tab-item svg { width: 24px; height: 24px; }
.tab-item.active { color: var(--green-700); }
.tab-item.active svg { color: var(--green-700); }
.tab-item svg { color: var(--ink-400); }

/* ============================================================

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  font-family: var(--font-base);
  font-weight: 700;
  transition: transform 0.15s ease, opacity 0.15s ease;
}
.btn:active { transform: scale(0.97); opacity: 0.9; }

.btn-primary {
  background: var(--coral-500);
  color: var(--white);
  font-size: 16px;
  border-radius: var(--r-pill);
  padding: 16px 24px;
  box-shadow: var(--shadow-coral);
  width: 100%;
}
.btn-secondary {
  background: var(--green-50);
  color: var(--green-700);
  font-size: 15px;
  border-radius: var(--r-pill);
  padding: 13px 20px;
  width: 100%;
}
.btn-outline {
  background: transparent;
  color: var(--ink-700);
  font-size: 15px;
  border: 1.5px solid var(--ink-200);
  border-radius: var(--r-pill);
  padding: 12px 20px;
}
.btn-pill-sm {
  background: var(--green-700);
  color: var(--white);
  font-size: 13px;
  font-weight: 700;
  border-radius: var(--r-pill);
  padding: 9px 18px;
}
.btn-pill-sm.joined {
  background: var(--green-100);
  color: var(--green-700);
}
.btn-ghost {
  background: transparent;
  color: var(--green-700);
  font-size: 15px;
  font-weight: 700;
  padding: 8px;
}

/* ============================================================
   CARDS
   ============================================================ */
.card {
  background: var(--white);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--ink-100);
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--green-100);
  color: var(--green-700);
  font-size: 12px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: var(--r-pill);
  white-space: nowrap;
}
.chip.coral { background: var(--coral-100); color: var(--coral-700); }

  object-fit: cover;
  flex-shrink: 0;
  display: block;
  background: var(--green-200);

.avatar-stack { display: flex; }
.avatar-stack .avatar { border: 2px solid var(--white); margin-left: -10px; }
.avatar-stack .avatar:first-child { margin-left: 0; }

   INPUTS

  gap: 10px;

  padding: 13px 16px;
  color: var(--ink-500);
  font-size: 15px;
}
.input-search svg { flex-shrink: 0; color: var(--ink-400); }

  width: 100%;

  border-radius: var(--r-md);
  padding: 14px 16px;
  font-size: 15px;
  font-family: var(--font-base);
  color: var(--ink-900);
  background: var(--white);

.text-field:focus { outline: none; border-color: var(--green-500); }
.text-field::placeholder { color: var(--ink-400); }

.nav-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px 14px;

.icon-btn {
  width: 36px;

  background: var(--white);
